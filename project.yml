name: Sticky
options:
  bundleIdPrefix: com.yangshaoqing
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Sticky:
    type: application
    platform: macOS
    sources:
      - path: Sources/Sticky
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yangshaoqing.sticky
        PRODUCT_NAME: 侧边待办
        MARKETING_VERSION: "1.0.6"
        CURRENT_PROJECT_VERSION: "14"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_CFBundleDisplayName: 侧边待办
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 yangshaoqing. All rights reserved."
        CODE_SIGN_ENTITLEMENTS: Sources/Sticky/Sticky.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7J5C6QKK68

schemes:
  Sticky:
    build:
      targets:
        Sticky: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
